<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Ouyee Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      text-align:center;background:#1a1a1a;color:#fff;padding:24px
    }
    .thanks-icon{
      width:80px;height:80px;border-radius:50%;background:#c41e3a;
      display:inline-flex;align-items:center;justify-content:center;
      margin-bottom:32px;font-size:2.4rem
    }
    h1{font-size:2rem;font-weight:700;margin-bottom:12px}
    p{color:#aaa;margin-bottom:40px;font-size:1.05rem;line-height:1.7}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:14px 32px;border-radius:8px;font-size:.95rem;font-weight:600;
      background:#c41e3a;color:#fff;text-decoration:none;
      transition:all .25s;min-width:160px
    }
    .btn:hover{background:#a0182e;transform:translateY(-1px);box-shadow:0 8px 24px rgba(196,30,58,.3)}
  </style>
</head>
<body>
  <div>
    <div class="thanks-icon">✓</div>
    <h1>Thank You for Your Inquiry</h1>
    <p>Your message has been received.<br>We will get back to you within 24 hours.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
